name: Publish Reports to Wiki

on:
  push:
    branches: [main]
    paths:
      - "reports/**.md"

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed report files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            files=$(find reports -name "*.md" | sort)
          else
            files=$(git diff --name-only HEAD~1 HEAD -- "reports/*.md" | sort)
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Changed: $files"

      - name: Setup wiki directory
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"

          if git clone "$WIKI_URL" wiki 2>/dev/null; then
            echo "Cloned existing wiki."
          else
            echo "Wiki not found — bootstrapping fresh."
            mkdir -p wiki
            git -C wiki init -b main
            git -C wiki remote add origin "$WIKI_URL"
          fi

          git -C wiki config user.name  "github-actions[bot]"
          git -C wiki config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Copy reports and rebuild index
        run: |
          changed_files="${{ steps.changed.outputs.files }}"
          if [ -z "$changed_files" ]; then
            echo "No changed files — skipping."
            exit 0
          fi

          for f in $changed_files; do
            [ -f "$f" ] || continue
            cp "$f" "wiki/$(basename "$f")"
            echo "Copied $f"
          done

          # Rebuild Home.md index (newest first)
          {
            echo "# 乳癌治療趨勢週報"
            echo ""
            echo "> 每週自動生成 · 資料來源：OpenEvidence、OncDaily、OncLive、ESMO、ClinicalTrials.gov"
            echo ""
            echo "| 週次 | 連結 |"
            echo "|------|------|"
            for md in $(ls wiki/[0-9][0-9][0-9][0-9]-W[0-9][0-9].md 2>/dev/null | sort -r); do
              week="$(basename "${md%.md}")"
              echo "| $week | [[$week]] |"
            done
          } > wiki/Home.md

      - name: Commit and push wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git -C wiki add -A
          if git -C wiki diff --cached --quiet; then
            echo "Wiki already up-to-date."
          else
            git -C wiki commit -m "wiki: $(date -u +%Y-%m-%d) — publish reports [skip ci]"
            git -C wiki push "$WIKI_URL" HEAD:main --force
          fi
